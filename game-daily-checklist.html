<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>遊戲每日任務（自用）</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --bg-layer: linear-gradient(135deg, rgba(47, 111, 237, 0.06), rgba(22, 138, 87, 0.04));
      --panel: #ffffff;
      --text: #1c2230;
      --muted: #687086;
      --line: #dfe3ed;
      --accent: #2f6fed;
      --accent-dark: #2459c5;
      --ok: #168a57;
      --warn: #c45f16;
      --danger: #c23939;
      --shadow: 0 12px 30px rgba(31, 42, 68, 0.08);
      --decor: rgba(47, 111, 237, 0.16);
      --decor-strong: rgba(47, 111, 237, 0.34);
    }

    body[data-theme="night"] {
      color-scheme: dark;
      --bg: #101421;
      --bg-layer:
        radial-gradient(circle at 18% 18%, rgba(69, 115, 255, 0.22), transparent 28%),
        linear-gradient(135deg, rgba(21, 27, 45, 0.95), rgba(13, 17, 28, 0.95));
      --panel: #171d2c;
      --text: #edf2ff;
      --muted: #a9b3ca;
      --line: #2d3548;
      --accent: #7aa2ff;
      --accent-dark: #5c86e8;
      --ok: #55d89b;
      --warn: #ffb26f;
      --danger: #ff7777;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.32);
      --decor: rgba(122, 162, 255, 0.18);
      --decor-strong: rgba(122, 162, 255, 0.42);
    }

    body[data-theme="sakura"] {
      --bg: #fff7fb;
      --bg-layer:
        radial-gradient(circle at 18% 12%, rgba(255, 166, 202, 0.22), transparent 30%),
        linear-gradient(135deg, rgba(255, 244, 250, 0.95), rgba(246, 250, 255, 0.95));
      --accent: #df5f92;
      --accent-dark: #be4777;
      --ok: #168a57;
      --warn: #be5c21;
      --decor: rgba(223, 95, 146, 0.16);
      --decor-strong: rgba(223, 95, 146, 0.34);
    }

    body[data-theme="arcade"] {
      --bg: #11151f;
      --bg-layer:
        linear-gradient(90deg, rgba(58, 255, 214, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(58, 255, 214, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 78% 15%, rgba(255, 73, 205, 0.2), transparent 28%),
        linear-gradient(135deg, #121625, #0e111b);
      --panel: #181e2d;
      --text: #f2f6ff;
      --muted: #aab4c8;
      --line: #30394d;
      --accent: #39e0c4;
      --accent-dark: #23bca2;
      --ok: #55d89b;
      --warn: #ffd166;
      --danger: #ff6b8a;
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.34);
      --decor: rgba(57, 224, 196, 0.18);
      --decor-strong: rgba(255, 73, 205, 0.36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
      background-color: var(--bg);
      background-image: var(--bg-layer);
      background-attachment: fixed;
      background-size: auto, auto, auto, 100% 100%;
      color: var(--text);
      min-height: 100vh;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 180px;
      height: 180px;
      right: 28px;
      top: 120px;
      border: 2px solid var(--decor);
      border-radius: 28px;
      transform: rotate(12deg);
      box-shadow:
        -70px 260px 0 -45px var(--decor),
        -960px 90px 0 -70px var(--decor-strong);
      opacity: 0.8;
    }

    body::after {
      left: 26px;
      bottom: 34px;
      width: 140px;
      height: 84px;
      border: 2px solid var(--decor-strong);
      border-radius: 32px;
      opacity: 0.55;
      box-shadow:
        28px 30px 0 -28px var(--decor-strong),
        88px 30px 0 -28px var(--decor-strong);
    }

    main {
      position: relative;
      z-index: 1;
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 15px;
    }

    .hero-flair {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .flair-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel) 70%, var(--accent) 12%);
      color: var(--muted);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow);
    }

    .pixel-mark {
      width: 12px;
      height: 12px;
      background: var(--accent);
      clip-path: polygon(50% 0, 62% 34%, 100% 34%, 70% 56%, 82% 100%, 50% 74%, 18% 100%, 30% 56%, 0 34%, 38% 34%);
    }

    .date-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 170px;
      text-align: right;
      box-shadow: var(--shadow);
    }

    .date-box span {
      color: var(--muted);
      font-size: 13px;
      display: block;
    }

    .date-box strong {
      display: block;
      margin-top: 2px;
      font-size: 18px;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    section, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    form {
      display: grid;
      gap: 10px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input, textarea, select, button {
      font: inherit;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--panel);
      color: var(--text);
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin: -4px 0 4px;
    }

    .check-group {
      display: grid;
      gap: 8px;
    }

    .check-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .check-line input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { background: var(--accent-dark); }

    button.secondary {
      background: color-mix(in srgb, var(--accent) 12%, var(--panel));
      color: var(--text);
    }

    button.secondary:hover { background: color-mix(in srgb, var(--accent) 18%, var(--panel)); }

    button.danger {
      background: color-mix(in srgb, var(--danger) 14%, var(--panel));
      color: var(--danger);
    }

    button.danger:hover { background: color-mix(in srgb, var(--danger) 20%, var(--panel)); }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 10%, var(--panel));
      color: var(--muted);
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .pill.todo { color: var(--warn); background: color-mix(in srgb, var(--warn) 14%, var(--panel)); }
    .pill.done { color: var(--ok); background: color-mix(in srgb, var(--ok) 14%, var(--panel)); }

    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filters select {
      min-width: 138px;
      padding: 8px 10px;
    }

    .game-list {
      display: grid;
      gap: 0;
    }

    .empty {
      padding: 42px 18px;
      text-align: center;
      color: var(--muted);
    }

    .game-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 15px 14px;
      border-top: 1px solid var(--line);
    }

    .game-row:first-child { border-top: 0; }

    .game-row.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: -6px;
      background: color-mix(in srgb, var(--accent) 8%, var(--panel));
    }

    .drag-handle {
      width: 32px;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 8%, var(--panel));
      color: var(--muted);
      cursor: grab;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: 1px;
      touch-action: none;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .check {
      width: 24px;
      height: 24px;
      margin-top: 2px;
      accent-color: var(--accent);
    }

    .game-name {
      font-weight: 800;
      font-size: 17px;
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }

    .tasks {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    .task-sections {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .task-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: color-mix(in srgb, var(--panel) 84%, var(--accent) 6%);
    }

    .task-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
    }

    .task-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .task-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .task-toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .task-section.done .tasks {
      text-decoration: line-through;
    }

    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      font-size: 12px;
      color: var(--muted);
      background: color-mix(in srgb, var(--accent) 9%, var(--panel));
      border-radius: 999px;
      padding: 4px 8px;
    }

    .info-lines {
      display: grid;
      gap: 4px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .info-lines strong {
      color: var(--text);
    }

    .row-actions {
      display: flex;
      gap: 7px;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      padding: 0;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--accent) 10%, var(--panel));
      color: var(--text);
      font-weight: 900;
    }

    .icon-button:hover { background: color-mix(in srgb, var(--accent) 16%, var(--panel)); }
    .icon-button.delete { color: var(--danger); }

    .done-row .game-name,
    .done-row .tasks {
      color: var(--muted);
      text-decoration: line-through;
    }

    .export-box {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .sync-box {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .sync-box h3 {
      margin: 0;
      font-size: 16px;
    }

    .sync-status,
    .app-version {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      min-height: 18px;
    }

    .app-version {
      margin-top: 8px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: #1d2535;
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      font-size: 14px;
    }

    .toast.show { opacity: 1; }

    @media (max-width: 820px) {
      header {
        display: grid;
        align-items: start;
      }

      .date-box {
        text-align: left;
        width: 100%;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .game-row {
        grid-template-columns: auto 1fr;
      }

      .row-actions {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>遊戲每日任務（自用）</h1>
        <p class="subtitle">勾一下今天解完的遊戲，剩下沒解的一眼看清楚。</p>
        <div class="hero-flair" aria-hidden="true">
          <span class="flair-chip"><span class="pixel-mark"></span>Quest Log</span>
          <span class="flair-chip"><span class="pixel-mark"></span>Banner Tracker</span>
        </div>
      </div>
      <div class="date-box">
        <span>裝置日期</span>
        <strong id="todayLabel"></strong>
      </div>
    </header>

    <div class="layout">
      <aside class="panel">
        <h2 id="formTitle">新增遊戲</h2>
        <form id="gameForm">
          <input type="hidden" id="editingId">
          <div>
            <label for="gameName">遊戲名稱</label>
            <input id="gameName" autocomplete="off" placeholder="例如：原神、星穹鐵道、FGO" required>
          </div>
          <div>
            <label for="resetTime">每日重置時間</label>
            <input id="resetTime" type="time" value="00:00">
          </div>
          <div class="check-group">
            <label>固定付費標記</label>
            <label class="check-line">
              <input type="checkbox" id="hasMonthlyCard">
              有月卡
            </label>
            <label class="check-line">
              <input type="checkbox" id="hasBattlePass">
              有通行證
            </label>
          </div>
          <div>
            <label for="monthlyCardEndDate">月卡到期日</label>
            <div class="field-row">
              <input id="monthlyCardEndDate" type="date">
              <button class="secondary" type="button" id="buyMonthlyCardButton">今天購買 +30 天</button>
            </div>
          </div>
          <div>
            <label for="versionName">版本名稱</label>
            <input id="versionName" autocomplete="off" placeholder="例如：2.3 下半、夏日活動">
          </div>
          <div>
            <label for="versionEndDate">版本結束日</label>
            <input id="versionEndDate" type="date">
          </div>
          <div>
            <label for="bannerName">目前卡池</label>
            <input id="bannerName" autocomplete="off" placeholder="例如：角色 A / 角色 B">
          </div>
          <div>
            <label for="bannerEndDate">卡池結束日</label>
            <input id="bannerEndDate" type="date">
          </div>
          <div>
            <label for="bannerEndTime">卡池結束時間</label>
            <input id="bannerEndTime" type="time" value="23:59">
          </div>
          <div>
            <label for="dailyTasks">每日任務</label>
            <textarea id="dailyTasks" placeholder="例如：
領每日獎勵
清體力
公會簽到"></textarea>
          </div>
          <div>
            <label for="weeklyTasks">每週任務</label>
            <textarea id="weeklyTasks" placeholder="例如：
打週王
週任務獎勵
活動週次任務"></textarea>
          </div>
          <p class="hint">小提醒：每行一個任務，之後看起來最清楚。沒有的欄位可以留空。</p>
          <div class="actions">
            <button type="submit" id="saveButton">加入清單</button>
            <button class="secondary" type="button" id="cancelEditButton" hidden>取消編輯</button>
          </div>
        </form>

        <div class="export-box">
          <button class="secondary" type="button" id="copyTodoButton">複製未完成清單</button>
          <button class="secondary" type="button" id="resetCurrentButton">重置目前勾選</button>
          <button class="danger" type="button" id="clearAllButton">清空全部資料</button>
        </div>

        <div class="sync-box">
          <h3>外觀設定</h3>
          <div>
            <label for="themeSelect">背景主題</label>
            <select id="themeSelect">
              <option value="clean">清爽冒險</option>
              <option value="night">夜間任務</option>
              <option value="sakura">櫻花輕粉</option>
              <option value="arcade">電玩霓虹</option>
            </select>
          </div>
        </div>

        <div class="sync-box">
          <h3>雲端同步</h3>
          <p class="hint">使用 GitHub Gist 同步。手機和電腦填同一個 Gist ID，就會共用資料。</p>
          <div>
            <label for="syncToken">GitHub Token</label>
            <input id="syncToken" type="password" autocomplete="off" placeholder="需要 gist 權限">
          </div>
          <div>
            <label for="syncGistId">Gist ID</label>
            <input id="syncGistId" autocomplete="off" placeholder="第一次可留空，自動建立">
          </div>
          <div class="check-group">
            <label>同步方式</label>
            <label class="check-line">
              <input type="checkbox" id="autoPullOnLoad" checked>
              開啟網站時自動下載雲端
            </label>
            <label class="check-line">
              <input type="checkbox" id="autoPushOnChange" checked>
              修改後自動上傳同步
            </label>
          </div>
          <div class="actions">
            <button class="secondary" type="button" id="saveSyncButton">儲存同步設定</button>
            <button class="secondary" type="button" id="pullSyncButton">下載雲端</button>
            <button type="button" id="pushSyncButton">上傳同步</button>
          </div>
          <div class="sync-status" id="syncStatus">尚未設定同步。</div>
        </div>
        <div class="app-version" id="appVersionLabel"></div>
      </aside>

      <section>
        <div class="toolbar">
          <div class="summary">
            <span class="pill todo" id="todoCount">未完成 0</span>
            <span class="pill done" id="doneCount">已完成 0</span>
            <span class="pill" id="totalCount">總共 0</span>
          </div>
          <div class="filters">
            <label for="filterMode">顯示</label>
            <select id="filterMode">
              <option value="todo">只看未完成</option>
              <option value="all">全部</option>
              <option value="done">只看已完成</option>
            </select>
          </div>
        </div>
        <div class="game-list" id="gameList"></div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "game-daily-checklist-v1";
    const SYNC_KEY = "game-daily-checklist-sync-v1";
    const THEME_KEY = "game-daily-checklist-theme-v1";
    const SYNC_FILE = "game-daily-checklist-data.json";
    const APP_VERSION = "v1.9.0";
    const $ = (selector) => document.querySelector(selector);

    const state = {
      games: [],
      sync: {
        token: "",
        gistId: "",
        enabled: false,
        autoPullOnLoad: true,
        autoPushOnChange: true,
        lastPulledAt: "",
        lastPushedAt: "",
        lastRemoteUpdatedAt: ""
      },
      filter: "todo",
      theme: "clean",
      today: new Date().toLocaleDateString("sv-SE"),
      week: getWeekKey(new Date())
    };

    function refreshCurrentDate() {
      const now = new Date();
      state.today = now.toLocaleDateString("sv-SE");
      state.week = getWeekKey(now);
      $("#todayLabel").textContent = new Intl.DateTimeFormat("zh-TW", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(now);
    }

    function startTimeHeartbeat() {
      window.setInterval(() => {
        const previousToday = state.today;
        refreshCurrentDate();
        render();
        if (state.today !== previousToday) updateSyncUi();
      }, 60000);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState !== "visible") return;
        refreshCurrentDate();
        render();
        autoPullIfConfigured();
      });
    }

    function loadTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      state.theme = ["clean", "night", "sakura", "arcade"].includes(saved) ? saved : "clean";
      applyTheme();
    }

    function applyTheme() {
      document.body.dataset.theme = state.theme;
      const select = $("#themeSelect");
      if (select) select.value = state.theme;
    }

    function saveTheme(theme) {
      state.theme = ["clean", "night", "sakura", "arcade"].includes(theme) ? theme : "clean";
      localStorage.setItem(THEME_KEY, state.theme);
      applyTheme();
    }

    function getWeekKey(date) {
      const current = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const day = current.getUTCDay() || 7;
      current.setUTCDate(current.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(current.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((current - yearStart) / 86400000) + 1) / 7);
      return `${current.getUTCFullYear()}-W${String(weekNo).padStart(2, "0")}`;
    }

    function parseResetTime(value) {
      const match = /^(\d{2}):(\d{2})$/.exec(value || "");
      if (!match) return { hours: 0, minutes: 0, value: "00:00" };
      const hours = Math.min(23, Math.max(0, Number(match[1])));
      const minutes = Math.min(59, Math.max(0, Number(match[2])));
      return {
        hours,
        minutes,
        value: `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`
      };
    }

    function gameCycleDate(game, now = new Date()) {
      const reset = parseResetTime(game.resetTime);
      const cycle = new Date(now);
      const resetToday = new Date(now);
      resetToday.setHours(reset.hours, reset.minutes, 0, 0);
      if (now < resetToday) cycle.setDate(cycle.getDate() - 1);
      return cycle;
    }

    function gameCycleDateKey(game) {
      return gameCycleDate(game).toLocaleDateString("sv-SE");
    }

    function gameWeekKey(game) {
      return getWeekKey(gameCycleDate(game));
    }

    function addDaysToToday(days) {
      const date = new Date(`${state.today}T00:00:00`);
      date.setDate(date.getDate() + days);
      return date.toLocaleDateString("sv-SE");
    }

    function normalizeGame(game) {
      if (game.dailyTasks === undefined && game.weeklyTasks === undefined) {
        if (game.frequency === "weekly") {
          game.dailyTasks = "";
          game.weeklyTasks = game.tasks || "";
        } else {
          game.dailyTasks = game.tasks || "";
          game.weeklyTasks = "";
        }
      }
      game.dailyTasks = game.dailyTasks || "";
      game.weeklyTasks = game.weeklyTasks || "";
      game.resetTime = parseResetTime(game.resetTime).value;
      game.hasMonthlyCard = Boolean(game.hasMonthlyCard);
      game.hasBattlePass = Boolean(game.hasBattlePass);
      game.monthlyCardEndDate = game.monthlyCardEndDate || "";
      game.versionName = game.versionName || "";
      game.versionEndDate = game.versionEndDate || "";
      game.bannerName = game.bannerName || "";
      game.bannerEndDate = game.bannerEndDate || "";
      game.bannerEndTime = parseResetTime(game.bannerEndTime || "23:59").value;
      game.completedDates = Array.isArray(game.completedDates) ? game.completedDates : [];
      return game;
    }

    function completionKey(game, type) {
      return type === "weekly" ? `W:${gameWeekKey(game)}` : `D:${gameCycleDateKey(game)}`;
    }

    function legacyCompletionKey(game, type) {
      return type === "weekly" ? gameWeekKey(game) : gameCycleDateKey(game);
    }

    function hasTask(game, type) {
      const value = type === "weekly" ? game.weeklyTasks : game.dailyTasks;
      return Boolean(value && value.trim());
    }

    function isTaskDone(game, type) {
      if (!hasTask(game, type)) return true;
      const completions = Array.isArray(game.completedDates) ? game.completedDates : [];
      return completions.includes(completionKey(game, type)) || completions.includes(legacyCompletionKey(game, type));
    }

    function isGameDone(game) {
      return isTaskDone(game, "daily") && isTaskDone(game, "weekly");
    }

    function hasAnyTask(game) {
      return hasTask(game, "daily") || hasTask(game, "weekly");
    }

    function taskStatusLabel(type, done) {
      if (type === "weekly") return done ? "本週已完成" : "本週未完成";
      return done ? "今天已完成" : "今天未完成";
    }

    function pendingLabels(game) {
      const labels = [];
      if (hasTask(game, "daily") && !isTaskDone(game, "daily")) labels.push("每日未完成");
      if (hasTask(game, "weekly") && !isTaskDone(game, "weekly")) labels.push("每週未完成");
      if (!labels.length && hasAnyTask(game)) labels.push("任務已完成");
      if (!labels.length) labels.push("沒有任務");
      return labels;
    }

    function paidTags(game) {
      const tags = [];
      if (game.hasMonthlyCard) tags.push("月卡");
      if (game.hasBattlePass) tags.push("通行證");
      return tags;
    }

    function daysUntil(dateText) {
      if (!dateText) return "";
      const target = new Date(`${dateText}T00:00:00`);
      if (Number.isNaN(target.getTime())) return "";
      const today = new Date(`${state.today}T00:00:00`);
      const days = Math.ceil((target - today) / 86400000);
      if (days > 0) return `剩 ${days} 天`;
      if (days === 0) return "今天結束";
      return `已結束 ${Math.abs(days)} 天`;
    }

    function timeUntil(dateText, timeText) {
      if (!dateText) return "";
      const time = parseResetTime(timeText || "23:59").value;
      const target = new Date(`${dateText}T${time}:00`);
      if (Number.isNaN(target.getTime())) return "";
      const diff = target - new Date();
      const abs = Math.abs(diff);
      const days = Math.floor(abs / 86400000);
      const hours = Math.floor((abs % 86400000) / 3600000);
      const minutes = Math.floor((abs % 3600000) / 60000);
      const detail = days > 0
        ? `${days} 天 ${hours} 小時`
        : hours > 0
          ? `${hours} 小時 ${minutes} 分`
          : `${minutes} 分`;
      if (diff > 0) return `剩 ${detail}`;
      if (diff === 0) return "現在結束";
      return `已結束 ${detail}`;
    }

    function infoLines(game) {
      const lines = [];
      if (game.hasMonthlyCard || game.monthlyCardEndDate) {
        const remain = daysUntil(game.monthlyCardEndDate);
        lines.push(`<div><strong>月卡：</strong>${remain || "未填到期日"}</div>`);
      }
      if (game.versionName || game.versionEndDate) {
        const left = game.versionName ? escapeHtml(game.versionName) : "未填版本";
        const remain = daysUntil(game.versionEndDate);
        lines.push(`<div><strong>版本：</strong>${left}${remain ? `，${remain}` : ""}</div>`);
      }
      if (game.bannerName || game.bannerEndDate) {
        const left = game.bannerName ? escapeHtml(game.bannerName) : "未填卡池";
        const remain = timeUntil(game.bannerEndDate, game.bannerEndTime);
        const endTime = game.bannerEndDate ? `（${parseResetTime(game.bannerEndTime).value}）` : "";
        lines.push(`<div><strong>卡池：</strong>${left}${remain ? `，${remain}${endTime}` : ""}</div>`);
      }
      return lines.length ? `<div class="info-lines">${lines.join("")}</div>` : "";
    }

    function plainInfoLines(game) {
      const lines = [];
      if (game.hasMonthlyCard || game.monthlyCardEndDate) {
        const remain = daysUntil(game.monthlyCardEndDate);
        lines.push(`月卡：${remain || "未填到期日"}`);
      }
      if (game.versionName || game.versionEndDate) {
        const remain = daysUntil(game.versionEndDate);
        lines.push(`版本：${game.versionName || "未填版本"}${remain ? `，${remain}` : ""}`);
      }
      if (game.bannerName || game.bannerEndDate) {
        const remain = timeUntil(game.bannerEndDate, game.bannerEndTime);
        const endTime = game.bannerEndDate ? `（${parseResetTime(game.bannerEndTime).value}）` : "";
        lines.push(`卡池：${game.bannerName || "未填卡池"}${remain ? `，${remain}${endTime}` : ""}`);
      }
      return lines;
    }

    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        state.games = [];
        return;
      }

      try {
        const parsed = JSON.parse(raw);
        state.games = Array.isArray(parsed.games) ? parsed.games.map(normalizeGame) : [];
      } catch {
        state.games = [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ games: state.games }));
      scheduleCloudPush();
    }

    function saveLocalOnly() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ games: state.games }));
    }

    function loadSyncSettings() {
      try {
        const raw = localStorage.getItem(SYNC_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        state.sync = {
          token: parsed.token || "",
          gistId: parsed.gistId || "",
          enabled: Boolean(parsed.token),
          autoPullOnLoad: parsed.autoPullOnLoad !== false,
          autoPushOnChange: parsed.autoPushOnChange !== false,
          lastPulledAt: parsed.lastPulledAt || "",
          lastPushedAt: parsed.lastPushedAt || "",
          lastRemoteUpdatedAt: parsed.lastRemoteUpdatedAt || ""
        };
      } catch {
        state.sync = {
          token: "",
          gistId: "",
          enabled: false,
          autoPullOnLoad: true,
          autoPushOnChange: true,
          lastPulledAt: "",
          lastPushedAt: "",
          lastRemoteUpdatedAt: ""
        };
      }
    }

    function saveSyncSettings() {
      state.sync.token = $("#syncToken").value.trim();
      state.sync.gistId = $("#syncGistId").value.trim();
      state.sync.enabled = Boolean(state.sync.token);
      state.sync.autoPullOnLoad = $("#autoPullOnLoad").checked;
      state.sync.autoPushOnChange = $("#autoPushOnChange").checked;
      persistSyncSettings();
      updateSyncUi();
    }

    function persistSyncSettings() {
      localStorage.setItem(SYNC_KEY, JSON.stringify(state.sync));
    }

    function exportData() {
      return {
        version: 1,
        appVersion: APP_VERSION,
        updatedAt: new Date().toISOString(),
        games: state.games
      };
    }

    function importData(data) {
      if (!data || !Array.isArray(data.games)) {
        throw new Error("雲端資料格式不正確。");
      }
      state.games = data.games.map(normalizeGame);
      saveLocalOnly();
      render();
    }

    function updateSyncUi(message) {
      $("#syncToken").value = state.sync.token || "";
      $("#syncGistId").value = state.sync.gistId || "";
      $("#autoPullOnLoad").checked = state.sync.autoPullOnLoad !== false;
      $("#autoPushOnChange").checked = state.sync.autoPushOnChange !== false;
      const last = [
        state.sync.lastPulledAt ? `上次下載：${new Date(state.sync.lastPulledAt).toLocaleString("zh-TW")}` : "",
        state.sync.lastPushedAt ? `上次上傳：${new Date(state.sync.lastPushedAt).toLocaleString("zh-TW")}` : ""
      ].filter(Boolean).join("；");
      const status = message || (state.sync.enabled
        ? `同步已設定${state.sync.gistId ? `，Gist ID：${state.sync.gistId}` : "，尚未建立 Gist"}。${last ? ` ${last}` : ""}`
        : "尚未設定同步。");
      $("#syncStatus").textContent = status;
    }

    function updateAppVersionUi() {
      $("#appVersionLabel").textContent = `目前版本：${APP_VERSION}`;
    }

    async function requestGist(path, options = {}) {
      if (!state.sync.token) throw new Error("請先填 GitHub Token。");
      const response = await fetch(`https://api.github.com${path}`, {
        ...options,
        headers: {
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json",
          "Authorization": `Bearer ${state.sync.token}`,
          ...(options.headers || {})
        }
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`GitHub 回應 ${response.status}：${text.slice(0, 120)}`);
      }

      return response.json();
    }

    function parseCloudData(gist) {
      const file = gist.files?.[SYNC_FILE];
      if (!file?.content) throw new Error(`找不到 ${SYNC_FILE}。`);
      return JSON.parse(file.content);
    }

    function isRemoteNewer(remoteUpdatedAt) {
      if (!remoteUpdatedAt) return false;
      const known = state.sync.lastRemoteUpdatedAt || state.sync.lastPulledAt || state.sync.lastPushedAt || "";
      return Boolean(known) && new Date(remoteUpdatedAt) > new Date(known);
    }

    async function fetchCloudData() {
      const gist = await requestGist(`/gists/${state.sync.gistId}`, { method: "GET" });
      return parseCloudData(gist);
    }

    async function pushCloudSync(showDone = true, options = {}) {
      if (!state.sync.enabled) return;
      updateSyncUi("正在上傳同步...");
      if (state.sync.gistId && !options.force) {
        const remoteData = await fetchCloudData();
        if (isRemoteNewer(remoteData.updatedAt)) {
          throw new Error("雲端資料比較新，請先按「下載雲端」再上傳。");
        }
      }
      const body = {
        description: "Game daily checklist sync data",
        public: false,
        files: {
          [SYNC_FILE]: {
            content: JSON.stringify(exportData(), null, 2)
          }
        }
      };

      if (!state.sync.gistId) {
        const gist = await requestGist("/gists", {
          method: "POST",
          body: JSON.stringify(body)
        });
        state.sync.gistId = gist.id;
        $("#syncGistId").value = gist.id;
      } else {
        await requestGist(`/gists/${state.sync.gistId}`, {
          method: "PATCH",
          body: JSON.stringify({ files: body.files })
        });
      }

      state.sync.lastPushedAt = new Date().toISOString();
      state.sync.lastRemoteUpdatedAt = JSON.parse(body.files[SYNC_FILE].content).updatedAt;
      persistSyncSettings();
      if (showDone) showToast("已上傳同步");
      updateSyncUi(`同步完成：${new Date().toLocaleTimeString("zh-TW")}`);
    }

    async function pullCloudSync(options = {}) {
      if (options.saveForm !== false) saveSyncSettings();
      if (!state.sync.gistId) throw new Error("請先填 Gist ID，或先按上傳同步建立一個。");
      updateSyncUi("正在下載雲端資料...");
      const data = await fetchCloudData();
      importData(data);
      state.sync.lastPulledAt = new Date().toISOString();
      state.sync.lastRemoteUpdatedAt = data.updatedAt || state.sync.lastPulledAt;
      persistSyncSettings();
      if (!options.silent) showToast("已下載雲端資料");
      updateSyncUi(`已下載：${new Date().toLocaleTimeString("zh-TW")}`);
    }

    function scheduleCloudPush() {
      if (!state.sync.enabled || !state.sync.autoPushOnChange) return;
      window.clearTimeout(scheduleCloudPush.timer);
      scheduleCloudPush.timer = window.setTimeout(() => {
        pushCloudSync(false).catch((error) => updateSyncUi(`自動同步失敗：${error.message}`));
      }, 900);
    }

    async function runSyncAction(action) {
      try {
        await action();
      } catch (error) {
        updateSyncUi(`同步失敗：${error.message}`);
        showToast("同步失敗");
      }
    }

    function autoPullIfConfigured() {
      if (!state.sync.enabled || !state.sync.gistId || state.sync.autoPullOnLoad === false) return;
      runSyncAction(async () => {
        await pullCloudSync({ saveForm: false, silent: true });
        updateSyncUi(`已自動下載：${new Date().toLocaleTimeString("zh-TW")}`);
      });
    }

    function setDone(gameId, type, done) {
      const game = state.games.find((item) => item.id === gameId);
      if (!game) return;

      game.completedDates = Array.isArray(game.completedDates) ? game.completedDates : [];
      const key = completionKey(game, type);
      const legacyKey = legacyCompletionKey(game, type);
      if (done && !game.completedDates.includes(key)) {
        game.completedDates.push(key);
      }
      if (!done) {
        game.completedDates = game.completedDates.filter((date) => date !== key && date !== legacyKey);
      }

      save();
      render();
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderTaskSection(game, type) {
      if (!hasTask(game, type)) return "";
      const done = isTaskDone(game, type);
      const title = type === "weekly" ? "每週任務" : "每日任務";
      const tasks = type === "weekly" ? game.weeklyTasks : game.dailyTasks;
      return `
        <div class="task-section ${done ? "done" : ""}">
          <div class="task-section-head">
            <span class="task-title">${title}</span>
            <label class="task-toggle">
              <input type="checkbox" ${done ? "checked" : ""} data-action="toggle-${type}" data-id="${game.id}">
              ${taskStatusLabel(type, done)}
            </label>
          </div>
          <div class="tasks">${escapeHtml(tasks.trim())}</div>
        </div>
      `;
    }

    function render() {
      const list = $("#gameList");
      const doneGames = state.games.filter(isGameDone);
      const todoGames = state.games.filter((game) => !isGameDone(game));

      $("#todoCount").textContent = `未完成 ${todoGames.length}`;
      $("#doneCount").textContent = `已完成 ${doneGames.length}`;
      $("#totalCount").textContent = `總共 ${state.games.length}`;

      let visibleGames = state.games;
      if (state.filter === "todo") visibleGames = todoGames;
      if (state.filter === "done") visibleGames = doneGames;

      if (visibleGames.length === 0) {
        list.innerHTML = `<div class="empty">${state.games.length === 0 ? "還沒有遊戲，先新增一個吧。" : "這個分類目前沒有項目。"}</div>`;
        return;
      }

      list.innerHTML = visibleGames.map((game) => {
        const done = isGameDone(game);
        return `
          <article class="game-row ${done ? "done-row" : ""}" draggable="true" data-id="${game.id}">
            <button class="drag-handle" type="button" title="拖曳排序" aria-label="拖曳排序" data-action="drag-handle">⋮⋮</button>
            <div>
              <div class="game-name">${escapeHtml(game.name)}</div>
              <div class="task-sections">
                ${renderTaskSection(game, "daily")}
                ${renderTaskSection(game, "weekly")}
                ${hasAnyTask(game) ? "" : `<div class="tasks">沒有填任務內容</div>`}
              </div>
              ${infoLines(game)}
              <div class="meta">
                <span class="tag">重置 ${parseResetTime(game.resetTime).value}</span>
                ${pendingLabels(game).map((tag) => `<span class="tag">${tag}</span>`).join("")}
                ${paidTags(game).map((tag) => `<span class="tag">${tag}</span>`).join("")}
                ${game.updatedAt ? `<span class="tag">更新：${escapeHtml(game.updatedAt)}</span>` : ""}
              </div>
            </div>
            <div class="row-actions">
              <button class="icon-button" type="button" title="上移" data-action="move-up" data-id="${game.id}">↑</button>
              <button class="icon-button" type="button" title="下移" data-action="move-down" data-id="${game.id}">↓</button>
              <button class="icon-button" type="button" title="編輯" data-action="edit" data-id="${game.id}">✎</button>
              <button class="icon-button delete" type="button" title="刪除" data-action="delete" data-id="${game.id}">×</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function resetForm() {
      $("#editingId").value = "";
      $("#gameName").value = "";
      $("#resetTime").value = "00:00";
      $("#hasMonthlyCard").checked = false;
      $("#hasBattlePass").checked = false;
      $("#monthlyCardEndDate").value = "";
      $("#versionName").value = "";
      $("#versionEndDate").value = "";
      $("#bannerName").value = "";
      $("#bannerEndDate").value = "";
      $("#bannerEndTime").value = "23:59";
      $("#dailyTasks").value = "";
      $("#weeklyTasks").value = "";
      $("#formTitle").textContent = "新增遊戲";
      $("#saveButton").textContent = "加入清單";
      $("#cancelEditButton").hidden = true;
    }

    $("#gameForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const id = $("#editingId").value;
      const name = $("#gameName").value.trim();
      const resetTime = parseResetTime($("#resetTime").value).value;
      const hasMonthlyCard = $("#hasMonthlyCard").checked;
      const hasBattlePass = $("#hasBattlePass").checked;
      const monthlyCardEndDate = $("#monthlyCardEndDate").value;
      const versionName = $("#versionName").value.trim();
      const versionEndDate = $("#versionEndDate").value;
      const bannerName = $("#bannerName").value.trim();
      const bannerEndDate = $("#bannerEndDate").value;
      const bannerEndTime = parseResetTime($("#bannerEndTime").value || "23:59").value;
      const dailyTasks = $("#dailyTasks").value.trim();
      const weeklyTasks = $("#weeklyTasks").value.trim();
      if (!name) return;

      if (id) {
        const game = state.games.find((item) => item.id === id);
        if (game) {
          game.name = name;
          game.resetTime = resetTime;
          game.hasMonthlyCard = hasMonthlyCard;
          game.hasBattlePass = hasBattlePass;
          game.monthlyCardEndDate = monthlyCardEndDate;
          game.versionName = versionName;
          game.versionEndDate = versionEndDate;
          game.bannerName = bannerName;
          game.bannerEndDate = bannerEndDate;
          game.bannerEndTime = bannerEndTime;
          game.dailyTasks = dailyTasks;
          game.weeklyTasks = weeklyTasks;
          game.updatedAt = state.today;
          showToast("已更新遊戲");
        }
      } else {
        state.games.push({
          id: crypto.randomUUID(),
          name,
          resetTime,
          hasMonthlyCard,
          hasBattlePass,
          monthlyCardEndDate,
          versionName,
          versionEndDate,
          bannerName,
          bannerEndDate,
          bannerEndTime,
          dailyTasks,
          weeklyTasks,
          completedDates: [],
          updatedAt: state.today
        });
        showToast("已加入遊戲");
      }

      save();
      resetForm();
      render();
    });

    $("#gameList").addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      if (target.dataset.action === "drag-handle") return;

      const id = target.dataset.id;
      const action = target.dataset.action;
      const game = state.games.find((item) => item.id === id);
      if (!game) return;

      if (action === "toggle") {
        setDone(id, "daily", target.checked);
      }

      if (action === "toggle-daily") {
        setDone(id, "daily", target.checked);
      }

      if (action === "toggle-weekly") {
        setDone(id, "weekly", target.checked);
      }

      if (action === "move-up" || action === "move-down") {
        const index = state.games.findIndex((item) => item.id === id);
        const nextIndex = action === "move-up" ? index - 1 : index + 1;
        if (index < 0 || nextIndex < 0 || nextIndex >= state.games.length) return;
        const [moved] = state.games.splice(index, 1);
        state.games.splice(nextIndex, 0, moved);
        save();
        render();
        showToast("已更新排序");
      }

      if (action === "edit") {
        $("#editingId").value = game.id;
        $("#gameName").value = game.name;
        $("#resetTime").value = parseResetTime(game.resetTime).value;
        $("#hasMonthlyCard").checked = Boolean(game.hasMonthlyCard);
        $("#hasBattlePass").checked = Boolean(game.hasBattlePass);
        $("#monthlyCardEndDate").value = game.monthlyCardEndDate || "";
        $("#versionName").value = game.versionName || "";
        $("#versionEndDate").value = game.versionEndDate || "";
        $("#bannerName").value = game.bannerName || "";
        $("#bannerEndDate").value = game.bannerEndDate || "";
        $("#bannerEndTime").value = parseResetTime(game.bannerEndTime || "23:59").value;
        $("#dailyTasks").value = game.dailyTasks || "";
        $("#weeklyTasks").value = game.weeklyTasks || "";
        $("#formTitle").textContent = "編輯遊戲";
        $("#saveButton").textContent = "儲存變更";
        $("#cancelEditButton").hidden = false;
        $("#gameName").focus();
      }

      if (action === "delete") {
        if (!confirm(`確定刪除「${game.name}」嗎？`)) return;
        state.games = state.games.filter((item) => item.id !== id);
        save();
        resetForm();
        render();
        showToast("已刪除遊戲");
      }
    });

    $("#gameList").addEventListener("dragstart", (event) => {
      const row = event.target.closest(".game-row");
      if (!row) return;
      event.dataTransfer.setData("text/plain", row.dataset.id);
      event.dataTransfer.effectAllowed = "move";
    });

    $("#gameList").addEventListener("dragover", (event) => {
      const row = event.target.closest(".game-row");
      if (!row) return;
      event.preventDefault();
      row.classList.add("drag-over");
    });

    $("#gameList").addEventListener("dragleave", (event) => {
      const row = event.target.closest(".game-row");
      if (row) row.classList.remove("drag-over");
    });

    $("#gameList").addEventListener("drop", (event) => {
      const row = event.target.closest(".game-row");
      if (!row) return;
      event.preventDefault();
      row.classList.remove("drag-over");
      const draggedId = event.dataTransfer.getData("text/plain");
      const targetId = row.dataset.id;
      if (!draggedId || draggedId === targetId) return;

      const from = state.games.findIndex((game) => game.id === draggedId);
      const to = state.games.findIndex((game) => game.id === targetId);
      if (from < 0 || to < 0) return;

      const [moved] = state.games.splice(from, 1);
      state.games.splice(to, 0, moved);
      save();
      render();
      showToast("已更新排序");
    });

    $("#gameList").addEventListener("dragend", () => {
      document.querySelectorAll(".drag-over").forEach((item) => item.classList.remove("drag-over"));
    });

    $("#filterMode").addEventListener("change", (event) => {
      state.filter = event.target.value;
      render();
    });

    $("#themeSelect").addEventListener("change", (event) => {
      saveTheme(event.target.value);
    });

    $("#buyMonthlyCardButton").addEventListener("click", () => {
      $("#hasMonthlyCard").checked = true;
      $("#monthlyCardEndDate").value = addDaysToToday(30);
      showToast("已填入月卡到期日");
    });

    $("#cancelEditButton").addEventListener("click", resetForm);

    $("#resetCurrentButton").addEventListener("click", () => {
      state.games.forEach((game) => {
        const keys = [
          completionKey(game, "daily"),
          completionKey(game, "weekly"),
          legacyCompletionKey(game, "daily"),
          legacyCompletionKey(game, "weekly")
        ];
        game.completedDates = (game.completedDates || []).filter((date) => !keys.includes(date));
      });
      save();
      render();
      showToast("已重置目前勾選");
    });

    $("#clearAllButton").addEventListener("click", () => {
      if (!confirm("確定要清空全部遊戲資料嗎？這個動作不能復原。")) return;
      state.games = [];
      save();
      resetForm();
      render();
      showToast("已清空資料");
    });

    $("#copyTodoButton").addEventListener("click", async () => {
      const todoGames = state.games.filter((game) => !isGameDone(game));
      const text = todoGames.length
        ? `目前還沒完成的遊戲任務：\n${todoGames.map((game) => {
          const extraLines = plainInfoLines(game);
          const taskLines = [];
          if (hasTask(game, "daily") && !isTaskDone(game, "daily")) {
            taskLines.push("每日任務：");
            taskLines.push(...game.dailyTasks.split("\n").map((line) => `  ${line}`));
          }
          if (hasTask(game, "weekly") && !isTaskDone(game, "weekly")) {
            taskLines.push("每週任務：");
            taskLines.push(...game.weeklyTasks.split("\n").map((line) => `  ${line}`));
          }
          return `- [${paidTags(game).join(" / ") || "任務"}] ${game.name}${[...extraLines, ...taskLines].length ? `\n  ${[...extraLines, ...taskLines].join("\n  ")}` : ""}`;
        }).join("\n")}`
        : "目前的遊戲任務都完成了。";

      try {
        await navigator.clipboard.writeText(text);
        showToast("已複製未完成清單");
      } catch {
        prompt("複製這段文字：", text);
      }
    });

    $("#saveSyncButton").addEventListener("click", () => {
      saveSyncSettings();
      showToast("已儲存同步設定");
      if (state.sync.autoPullOnLoad && state.sync.gistId) {
        runSyncAction(() => pullCloudSync({ saveForm: false }));
      }
    });

    $("#pushSyncButton").addEventListener("click", () => {
      saveSyncSettings();
      runSyncAction(() => pushCloudSync(true));
    });

    $("#pullSyncButton").addEventListener("click", () => {
      runSyncAction(pullCloudSync);
    });

    refreshCurrentDate();
    loadTheme();
    load();
    loadSyncSettings();
    updateAppVersionUi();
    updateSyncUi();
    render();
    autoPullIfConfigured();
    startTimeHeartbeat();
  </script>
</body>
</html>
