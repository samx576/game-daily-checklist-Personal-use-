<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>遊戲每日任務（自用）</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1c2230;
      --muted: #687086;
      --line: #dfe3ed;
      --accent: #2f6fed;
      --accent-dark: #2459c5;
      --ok: #168a57;
      --warn: #c45f16;
      --danger: #c23939;
      --shadow: 0 12px 30px rgba(31, 42, 68, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 15px;
    }

    .date-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 170px;
      text-align: right;
      box-shadow: var(--shadow);
    }

    .date-box span {
      color: var(--muted);
      font-size: 13px;
      display: block;
    }

    .date-box strong {
      display: block;
      margin-top: 2px;
      font-size: 18px;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    section, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    form {
      display: grid;
      gap: 10px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input, textarea, select, button {
      font: inherit;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin: -4px 0 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { background: var(--accent-dark); }

    button.secondary {
      background: #e8ecf5;
      color: var(--text);
    }

    button.secondary:hover { background: #dbe1ee; }

    button.danger {
      background: #fae7e7;
      color: var(--danger);
    }

    button.danger:hover { background: #f5d6d6; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      border-radius: 999px;
      background: #eef2fb;
      color: var(--muted);
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .pill.todo { color: var(--warn); background: #fff1e6; }
    .pill.done { color: var(--ok); background: #e7f6ef; }

    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filters select {
      min-width: 138px;
      padding: 8px 10px;
    }

    .game-list {
      display: grid;
      gap: 0;
    }

    .empty {
      padding: 42px 18px;
      text-align: center;
      color: var(--muted);
    }

    .game-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 15px 14px;
      border-top: 1px solid var(--line);
    }

    .game-row:first-child { border-top: 0; }

    .check {
      width: 24px;
      height: 24px;
      margin-top: 2px;
      accent-color: var(--accent);
    }

    .game-name {
      font-weight: 800;
      font-size: 17px;
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }

    .tasks {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      font-size: 12px;
      color: var(--muted);
      background: #f1f3f8;
      border-radius: 999px;
      padding: 4px 8px;
    }

    .row-actions {
      display: flex;
      gap: 7px;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      padding: 0;
      display: grid;
      place-items: center;
      background: #f1f3f8;
      color: var(--text);
      font-weight: 900;
    }

    .icon-button:hover { background: #e4e8f1; }
    .icon-button.delete { color: var(--danger); }

    .done-row .game-name,
    .done-row .tasks {
      color: var(--muted);
      text-decoration: line-through;
    }

    .export-box {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .sync-box {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .sync-box h3 {
      margin: 0;
      font-size: 16px;
    }

    .sync-status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      min-height: 18px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: #1d2535;
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      font-size: 14px;
    }

    .toast.show { opacity: 1; }

    @media (max-width: 820px) {
      header {
        display: grid;
        align-items: start;
      }

      .date-box {
        text-align: left;
        width: 100%;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .game-row {
        grid-template-columns: auto 1fr;
      }

      .row-actions {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>遊戲每日任務（自用）</h1>
        <p class="subtitle">勾一下今天解完的遊戲，剩下沒解的一眼看清楚。</p>
      </div>
      <div class="date-box">
        <span>今天</span>
        <strong id="todayLabel"></strong>
      </div>
    </header>

    <div class="layout">
      <aside class="panel">
        <h2 id="formTitle">新增遊戲</h2>
        <form id="gameForm">
          <input type="hidden" id="editingId">
          <div>
            <label for="gameName">遊戲名稱</label>
            <input id="gameName" autocomplete="off" placeholder="例如：原神、星穹鐵道、FGO" required>
          </div>
          <div>
            <label for="frequency">更新週期</label>
            <select id="frequency">
              <option value="daily">每日</option>
              <option value="weekly">每週（週一重置）</option>
            </select>
          </div>
          <div>
            <label for="taskText">要做什麼</label>
            <textarea id="taskText" placeholder="例如：
領每日獎勵
清體力
公會簽到"></textarea>
          </div>
          <p class="hint">小提醒：每行一個任務，之後看起來最清楚。</p>
          <div class="actions">
            <button type="submit" id="saveButton">加入清單</button>
            <button class="secondary" type="button" id="cancelEditButton" hidden>取消編輯</button>
          </div>
        </form>

        <div class="export-box">
          <button class="secondary" type="button" id="copyTodoButton">複製未完成清單</button>
          <button class="secondary" type="button" id="resetCurrentButton">重置目前勾選</button>
          <button class="danger" type="button" id="clearAllButton">清空全部資料</button>
        </div>

        <div class="sync-box">
          <h3>雲端同步</h3>
          <p class="hint">使用 GitHub Gist 同步。手機和電腦填同一個 Gist ID，就會共用資料。</p>
          <div>
            <label for="syncToken">GitHub Token</label>
            <input id="syncToken" type="password" autocomplete="off" placeholder="需要 gist 權限">
          </div>
          <div>
            <label for="syncGistId">Gist ID</label>
            <input id="syncGistId" autocomplete="off" placeholder="第一次可留空，自動建立">
          </div>
          <div class="actions">
            <button class="secondary" type="button" id="saveSyncButton">儲存同步設定</button>
            <button class="secondary" type="button" id="pullSyncButton">下載雲端</button>
            <button type="button" id="pushSyncButton">上傳同步</button>
          </div>
          <div class="sync-status" id="syncStatus">尚未設定同步。</div>
        </div>
      </aside>

      <section>
        <div class="toolbar">
          <div class="summary">
            <span class="pill todo" id="todoCount">未完成 0</span>
            <span class="pill done" id="doneCount">已完成 0</span>
            <span class="pill" id="totalCount">總共 0</span>
          </div>
          <div class="filters">
            <label for="filterMode">顯示</label>
            <select id="filterMode">
              <option value="todo">只看未完成</option>
              <option value="all">全部</option>
              <option value="done">只看已完成</option>
            </select>
          </div>
        </div>
        <div class="game-list" id="gameList"></div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "game-daily-checklist-v1";
    const SYNC_KEY = "game-daily-checklist-sync-v1";
    const SYNC_FILE = "game-daily-checklist-data.json";
    const $ = (selector) => document.querySelector(selector);

    const state = {
      games: [],
      sync: {
        token: "",
        gistId: "",
        enabled: false
      },
      filter: "todo",
      today: new Date().toLocaleDateString("sv-SE"),
      week: getWeekKey(new Date())
    };

    function getWeekKey(date) {
      const current = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const day = current.getUTCDay() || 7;
      current.setUTCDate(current.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(current.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((current - yearStart) / 86400000) + 1) / 7);
      return `${current.getUTCFullYear()}-W${String(weekNo).padStart(2, "0")}`;
    }

    function normalizeGame(game) {
      game.frequency = game.frequency === "weekly" ? "weekly" : "daily";
      game.completedDates = Array.isArray(game.completedDates) ? game.completedDates : [];
      return game;
    }

    function completionKey(game) {
      return game.frequency === "weekly" ? `W:${state.week}` : `D:${state.today}`;
    }

    function legacyCompletionKey(game) {
      return game.frequency === "weekly" ? state.week : state.today;
    }

    function frequencyLabel(game) {
      return game.frequency === "weekly" ? "每週" : "每日";
    }

    function statusLabel(game, done) {
      if (game.frequency === "weekly") return done ? "本週已完成" : "本週未完成";
      return done ? "今天已完成" : "今天未完成";
    }

    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        state.games = [];
        return;
      }

      try {
        const parsed = JSON.parse(raw);
        state.games = Array.isArray(parsed.games) ? parsed.games.map(normalizeGame) : [];
      } catch {
        state.games = [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ games: state.games }));
      scheduleCloudPush();
    }

    function saveLocalOnly() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ games: state.games }));
    }

    function loadSyncSettings() {
      try {
        const raw = localStorage.getItem(SYNC_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        state.sync = {
          token: parsed.token || "",
          gistId: parsed.gistId || "",
          enabled: Boolean(parsed.token)
        };
      } catch {
        state.sync = { token: "", gistId: "", enabled: false };
      }
    }

    function saveSyncSettings() {
      state.sync.token = $("#syncToken").value.trim();
      state.sync.gistId = $("#syncGistId").value.trim();
      state.sync.enabled = Boolean(state.sync.token);
      localStorage.setItem(SYNC_KEY, JSON.stringify(state.sync));
      updateSyncUi();
    }

    function exportData() {
      return {
        version: 1,
        updatedAt: new Date().toISOString(),
        games: state.games
      };
    }

    function importData(data) {
      if (!data || !Array.isArray(data.games)) {
        throw new Error("雲端資料格式不正確。");
      }
      state.games = data.games.map(normalizeGame);
      saveLocalOnly();
      render();
    }

    function updateSyncUi(message) {
      $("#syncToken").value = state.sync.token || "";
      $("#syncGistId").value = state.sync.gistId || "";
      const status = message || (state.sync.enabled
        ? `同步已設定${state.sync.gistId ? `，Gist ID：${state.sync.gistId}` : "，尚未建立 Gist"}。`
        : "尚未設定同步。");
      $("#syncStatus").textContent = status;
    }

    async function requestGist(path, options = {}) {
      if (!state.sync.token) throw new Error("請先填 GitHub Token。");
      const response = await fetch(`https://api.github.com${path}`, {
        ...options,
        headers: {
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json",
          "Authorization": `Bearer ${state.sync.token}`,
          ...(options.headers || {})
        }
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`GitHub 回應 ${response.status}：${text.slice(0, 120)}`);
      }

      return response.json();
    }

    async function pushCloudSync(showDone = true) {
      if (!state.sync.enabled) return;
      updateSyncUi("正在上傳同步...");
      const body = {
        description: "Game daily checklist sync data",
        public: false,
        files: {
          [SYNC_FILE]: {
            content: JSON.stringify(exportData(), null, 2)
          }
        }
      };

      if (!state.sync.gistId) {
        const gist = await requestGist("/gists", {
          method: "POST",
          body: JSON.stringify(body)
        });
        state.sync.gistId = gist.id;
        $("#syncGistId").value = gist.id;
        localStorage.setItem(SYNC_KEY, JSON.stringify(state.sync));
      } else {
        await requestGist(`/gists/${state.sync.gistId}`, {
          method: "PATCH",
          body: JSON.stringify({ files: body.files })
        });
      }

      if (showDone) showToast("已上傳同步");
      updateSyncUi(`同步完成：${new Date().toLocaleTimeString("zh-TW")}`);
    }

    async function pullCloudSync() {
      saveSyncSettings();
      if (!state.sync.gistId) throw new Error("請先填 Gist ID，或先按上傳同步建立一個。");
      updateSyncUi("正在下載雲端資料...");
      const gist = await requestGist(`/gists/${state.sync.gistId}`, { method: "GET" });
      const file = gist.files?.[SYNC_FILE];
      if (!file?.content) throw new Error(`找不到 ${SYNC_FILE}。`);
      importData(JSON.parse(file.content));
      showToast("已下載雲端資料");
      updateSyncUi(`已下載：${new Date().toLocaleTimeString("zh-TW")}`);
    }

    function scheduleCloudPush() {
      if (!state.sync.enabled) return;
      window.clearTimeout(scheduleCloudPush.timer);
      scheduleCloudPush.timer = window.setTimeout(() => {
        pushCloudSync(false).catch((error) => updateSyncUi(`自動同步失敗：${error.message}`));
      }, 900);
    }

    async function runSyncAction(action) {
      try {
        await action();
      } catch (error) {
        updateSyncUi(`同步失敗：${error.message}`);
        showToast("同步失敗");
      }
    }

    function isDone(game) {
      const completions = Array.isArray(game.completedDates) ? game.completedDates : [];
      return completions.includes(completionKey(game)) || completions.includes(legacyCompletionKey(game));
    }

    function setDone(gameId, done) {
      const game = state.games.find((item) => item.id === gameId);
      if (!game) return;

      game.completedDates = Array.isArray(game.completedDates) ? game.completedDates : [];
      const key = completionKey(game);
      const legacyKey = legacyCompletionKey(game);
      if (done && !game.completedDates.includes(key)) {
        game.completedDates.push(key);
      }
      if (!done) {
        game.completedDates = game.completedDates.filter((date) => date !== key && date !== legacyKey);
      }

      save();
      render();
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      const list = $("#gameList");
      const doneGames = state.games.filter(isDone);
      const todoGames = state.games.filter((game) => !isDone(game));

      $("#todoCount").textContent = `未完成 ${todoGames.length}`;
      $("#doneCount").textContent = `已完成 ${doneGames.length}`;
      $("#totalCount").textContent = `總共 ${state.games.length}`;

      let visibleGames = state.games;
      if (state.filter === "todo") visibleGames = todoGames;
      if (state.filter === "done") visibleGames = doneGames;

      if (visibleGames.length === 0) {
        list.innerHTML = `<div class="empty">${state.games.length === 0 ? "還沒有遊戲，先新增一個吧。" : "這個分類目前沒有項目。"}</div>`;
        return;
      }

      list.innerHTML = visibleGames.map((game) => {
        const done = isDone(game);
        const tasks = game.tasks?.trim() || "沒有填任務內容";
        return `
          <article class="game-row ${done ? "done-row" : ""}">
            <input class="check" type="checkbox" ${done ? "checked" : ""} aria-label="切換 ${escapeHtml(game.name)} 完成狀態" data-action="toggle" data-id="${game.id}">
            <div>
              <div class="game-name">${escapeHtml(game.name)}</div>
              <div class="tasks">${escapeHtml(tasks)}</div>
              <div class="meta">
                <span class="tag">${frequencyLabel(game)}</span>
                <span class="tag">${statusLabel(game, done)}</span>
                ${game.updatedAt ? `<span class="tag">更新：${escapeHtml(game.updatedAt)}</span>` : ""}
              </div>
            </div>
            <div class="row-actions">
              <button class="icon-button" type="button" title="編輯" data-action="edit" data-id="${game.id}">✎</button>
              <button class="icon-button delete" type="button" title="刪除" data-action="delete" data-id="${game.id}">×</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function resetForm() {
      $("#editingId").value = "";
      $("#gameName").value = "";
      $("#frequency").value = "daily";
      $("#taskText").value = "";
      $("#formTitle").textContent = "新增遊戲";
      $("#saveButton").textContent = "加入清單";
      $("#cancelEditButton").hidden = true;
    }

    $("#gameForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const id = $("#editingId").value;
      const name = $("#gameName").value.trim();
      const frequency = $("#frequency").value === "weekly" ? "weekly" : "daily";
      const tasks = $("#taskText").value.trim();
      if (!name) return;

      if (id) {
        const game = state.games.find((item) => item.id === id);
        if (game) {
          game.name = name;
          game.frequency = frequency;
          game.tasks = tasks;
          game.updatedAt = state.today;
          showToast("已更新遊戲");
        }
      } else {
        state.games.push({
          id: crypto.randomUUID(),
          name,
          frequency,
          tasks,
          completedDates: [],
          updatedAt: state.today
        });
        showToast("已加入遊戲");
      }

      save();
      resetForm();
      render();
    });

    $("#gameList").addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;

      const id = target.dataset.id;
      const action = target.dataset.action;
      const game = state.games.find((item) => item.id === id);
      if (!game) return;

      if (action === "toggle") {
        setDone(id, target.checked);
      }

      if (action === "edit") {
        $("#editingId").value = game.id;
        $("#gameName").value = game.name;
        $("#frequency").value = game.frequency === "weekly" ? "weekly" : "daily";
        $("#taskText").value = game.tasks || "";
        $("#formTitle").textContent = "編輯遊戲";
        $("#saveButton").textContent = "儲存變更";
        $("#cancelEditButton").hidden = false;
        $("#gameName").focus();
      }

      if (action === "delete") {
        if (!confirm(`確定刪除「${game.name}」嗎？`)) return;
        state.games = state.games.filter((item) => item.id !== id);
        save();
        resetForm();
        render();
        showToast("已刪除遊戲");
      }
    });

    $("#filterMode").addEventListener("change", (event) => {
      state.filter = event.target.value;
      render();
    });

    $("#cancelEditButton").addEventListener("click", resetForm);

    $("#resetCurrentButton").addEventListener("click", () => {
      state.games.forEach((game) => {
        const key = completionKey(game);
        const legacyKey = legacyCompletionKey(game);
        game.completedDates = (game.completedDates || []).filter((date) => date !== key && date !== legacyKey);
      });
      save();
      render();
      showToast("已重置目前勾選");
    });

    $("#clearAllButton").addEventListener("click", () => {
      if (!confirm("確定要清空全部遊戲資料嗎？這個動作不能復原。")) return;
      state.games = [];
      save();
      resetForm();
      render();
      showToast("已清空資料");
    });

    $("#copyTodoButton").addEventListener("click", async () => {
      const todoGames = state.games.filter((game) => !isDone(game));
      const text = todoGames.length
        ? `目前還沒完成的遊戲任務：\n${todoGames.map((game) => `- [${frequencyLabel(game)}] ${game.name}${game.tasks ? `\n  ${game.tasks.split("\n").join("\n  ")}` : ""}`).join("\n")}`
        : "目前的遊戲任務都完成了。";

      try {
        await navigator.clipboard.writeText(text);
        showToast("已複製未完成清單");
      } catch {
        prompt("複製這段文字：", text);
      }
    });

    $("#saveSyncButton").addEventListener("click", () => {
      saveSyncSettings();
      showToast("已儲存同步設定");
    });

    $("#pushSyncButton").addEventListener("click", () => {
      saveSyncSettings();
      runSyncAction(() => pushCloudSync(true));
    });

    $("#pullSyncButton").addEventListener("click", () => {
      runSyncAction(pullCloudSync);
    });

    $("#todayLabel").textContent = new Intl.DateTimeFormat("zh-TW", {
      year: "numeric",
      month: "long",
      day: "numeric",
      weekday: "long"
    }).format(new Date());

    load();
    loadSyncSettings();
    updateSyncUi();
    render();
  </script>
</body>
</html>
